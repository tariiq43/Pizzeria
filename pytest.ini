[pytest]
# Wir suchen Tests nur im tests/-Ordner — keine versehentlichen Treffer
# in pages/ oder dao/, nur weil dort ein „test_" im Namen vorkommt.
testpaths = tests

# pizzeria/ aufs sys.path setzen, damit Imports wie
# `from utils.db import ...` und `from dao.kategorie_dao import ...`
# direkt funktionieren — ohne dass wir die Pakete installieren müssen.
pythonpath = .

# Etwas freundlichere Ausgabe: kurze Tracebacks reichen meistens, und
# `-q` macht den Lauf weniger geschwätzig (Standard-`-v` ist optional).
addopts = --tb=short

# Stille die DeprecationWarnings von SQLModel/Pydantic — sind in der
# aktuellen Version harmlos, blasen aber den Output zu.
filterwarnings =
    ignore::DeprecationWarning
